<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Dashboard - FarmKart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main>
    <div class="page-header">
      <h1>Farmer Dashboard</h1>
      <p>Manage your products and listings</p>
    </div>

    <div class="container dashboard">
      <div class="dashboard-grid">
        <div class="dashboard-form" id="product-form-container">
          <h2 id="form-title">Add New Product</h2>
          <form id="product-form">
            <input type="hidden" id="edit-id">

            <div class="form-group">
              <label class="form-label" for="prod-name">Product Name</label>
              <input type="text" id="prod-name" class="form-input" placeholder="e.g., Fresh Tomatoes" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="prod-desc">Description</label>
              <textarea id="prod-desc" class="form-textarea" placeholder="Describe your product..." required></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="prod-price">Price</label>
                <input type="number" id="prod-price" class="form-input" placeholder="0.00" min="0" step="0.01" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="prod-quantity">Quantity</label>
                <input type="number" id="prod-quantity" class="form-input" placeholder="0" min="0" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="prod-category">Category</label>
                <select id="prod-category" class="form-select" required>
                  <option value="">Select category</option>
                  <option value="vegetables">Vegetables</option>
                  <option value="fruits">Fruits</option>
                  <option value="grains">Grains</option>
                  <option value="dairy">Dairy</option>
                  <option value="herbs">Herbs</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="prod-unit">Unit</label>
                <select id="prod-unit" class="form-select">
                  <option value="kg">Kilogram (kg)</option>
                  <option value="g">Gram (g)</option>
                  <option value="dozen">Dozen</option>
                  <option value="piece">Piece</option>
                  <option value="litre">Litre</option>
                  <option value="bundle">Bundle</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="prod-image">Image URL (optional)</label>
              <input type="url" id="prod-image" class="form-input" placeholder="https://example.com/image.jpg">
            </div>

            <div style="display: flex; gap: 12px;">
              <button type="submit" class="btn btn-primary" style="flex:1;" id="form-submit-btn">Add Product</button>
              <button type="button" class="btn btn-outline" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">Cancel</button>
            </div>
          </form>
        </div>

        <div class="products-table">
          <h2>My Products</h2>
          <div id="products-list">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; margin: 0; padding: 0;">
        <p>&copy; 2024 FarmKart. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/farmer-dashboard.js"></script>
</body>
</html>
