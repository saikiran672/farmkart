<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FarmKart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main>
    <div class="auth-container">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your FarmKart account</p>

        <div id="alert-container"></div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Login</button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="/signup.html">Sign up here</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; margin: 0; padding: 0;">
        <p>&copy; 2024 FarmKart. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
