<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FarmKart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <main>
    <div class="auth-container" style="max-width: 560px;">
      <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join FarmKart as a farmer or customer</p>

        <div id="alert-container"></div>

        <form id="signup-form">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm Password</label>
              <input type="password" id="confirm-password" class="form-input" placeholder="Confirm password" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">I am a</label>
            <div class="radio-group">
              <label>
                <input type="radio" name="role" value="customer" checked>
                Customer
              </label>
              <label>
                <input type="radio" name="role" value="farmer">
                Farmer
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Phone (optional)</label>
            <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number">
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Address (optional)</label>
            <input type="text" id="address" class="form-input" placeholder="Enter your address">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;" id="submit-btn">Create Account</button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="/login.html">Login here</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; margin: 0; padding: 0;">
        <p>&copy; 2024 FarmKart. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
